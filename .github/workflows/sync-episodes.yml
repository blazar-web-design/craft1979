name: Sync episodes

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync YouTube RSS episodes
        run: pnpm sync:episodes

      - name: Commit episode updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync episodes from youtube rss'
          file_pattern: |
            src/lib/data/episode-sources.generated.json
            public/images/episode-*-thumb.jpg
