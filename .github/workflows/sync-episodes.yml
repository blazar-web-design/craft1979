# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v4                         34e114876b0b11c390a56381ad16ebd13914f8d5
#   pnpm/action-setup@v4                        b906affcce14559ad1aafd4ab0e942779e9f58b1
#   actions/setup-node@v4                       49933ea5288caeca8642d1e84afbd3f7d6820020
#   stefanzweifel/git-auto-commit-action@v5     b863ae1933cb653a53c021fe36dbb774e1fb9403
name: Sync episodes

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-episodes
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync YouTube RSS episodes
        run: pnpm sync:episodes

      - name: Commit episode updates
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          commit_message: 'chore: sync episodes from youtube rss'
          file_pattern: |
            src/lib/data/episode-sources.generated.json
            public/images/episode-*-thumb.jpg
