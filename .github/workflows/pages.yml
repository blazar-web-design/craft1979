# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v4                         34e114876b0b11c390a56381ad16ebd13914f8d5
#   pnpm/action-setup@v4                        b906affcce14559ad1aafd4ab0e942779e9f58b1
#   actions/setup-node@v4                       49933ea5288caeca8642d1e84afbd3f7d6820020
#   actions/configure-pages@v4                  1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d
#   actions/upload-pages-artifact@v4            7b1f4a764d45c48632c6b24a0339c27f5614fb0b
#   actions/deploy-pages@v4                     d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d
        id: pages

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path == '/' && '/' || format('{0}/', steps.pages.outputs.base_path) }}
          VITE_SITE_URL: ${{ steps.pages.outputs.origin }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
