services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:8080}
    image: craft1979:local
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64k
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"
    pids_limit: 100
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
